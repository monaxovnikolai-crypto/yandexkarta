<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Образовательная инфраструктура Московской области</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        
        .top-panel {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            z-index: 10;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
        }
        .district-select, .search-input {
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 14px;
            min-width: 200px;
        }
        .search-input { min-width: 280px; }
        .radius-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 24px;
        }
        .radius-input { width: 80px; padding: 6px 8px; border-radius: 12px; text-align: center; border: 1px solid #cbd5e1; }
        .mode-toggle {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 24px;
            padding: 3px;
        }
        .mode-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: transparent;
        }
        .mode-btn.active { background: #3b82f6; color: white; }
        .reset-btn { background: #ef4444; color: white; border: none; border-radius: 20px; padding: 6px 16px; cursor: pointer; }
        
        .stats-container { display: flex; gap: 16px; margin-left: auto; }
        .stat-block { background: #f1f5f9; border-radius: 12px; padding: 8px 16px; min-width: 180px; }
        .stat-block h4 { font-size: 12px; color: #64748b; margin-bottom: 6px; }
        .stat-numbers { display: flex; gap: 12px; font-size: 13px; font-weight: 600; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; font-weight: normal; color: #64748b; }
        
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left, .sidebar-right {
            width: 360px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-left { border-right: 1px solid #e2e8f0; }
        .sidebar-right { border-left: 1px solid #e2e8f0; }
        
        .section-header {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
        }
        .section-header h3 { font-size: 16px; font-weight: 600; }
        .stats-row { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; flex-wrap: wrap; }
        
        .objects-list { flex: 1; padding: 8px; overflow-y: auto; }
        .object-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 6px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .object-card:hover { border-color: #3b82f6; }
        .object-card.active { border-left: 4px solid #3b82f6; background: #eff6ff; }
        .object-card.in-radius { opacity: 1; }
        .object-card.out-radius { opacity: 0.5; background: #f1f5f9; }
        .object-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .object-address { font-size: 11px; color: #64748b; margin-bottom: 4px; }
        .object-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 6px;
        }
        .badge-school { background: #dbeafe; color: #1e40af; }
        .badge-kindergarten { background: #dcfce7; color: #166534; }
        .object-stats { font-size: 10px; color: #475569; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
        .load-bar { height: 3px; background: #e2e8f0; border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .load-bar-fill { height: 100%; border-radius: 2px; }
        
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            max-height: 80vh;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 16px;
            z-index: 30;
            border: 1px solid #e2e8f0;
        }
        .loading { padding: 20px; text-align: center; color: #64748b; }
        .route-info { font-size: 10px; color: #3b82f6; margin-top: 4px; }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #3b82f6;
            width: 0%;
            transition: width 0.3s;
            z-index: 100;
        }
        
        @media (max-width: 1200px) {
            .sidebar-left, .sidebar-right { width: 300px; }
            .stats-container { display: none; }
        }
    </style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="app">
    <div class="top-panel">
        <div class="filter-group">
            <label>🏛️ Городской округ:</label>
            <select id="districtSelect" class="district-select"><option>-- Загрузка округов --</option></select>
        </div>
        <div class="filter-group">
            <label>🔍 Поиск:</label>
            <input type="text" id="searchInput" class="search-input" placeholder="Название, адрес...">
        </div>
        <div class="radius-control">
            <label>🚶 Доступность:</label>
            <input type="number" id="radiusInput" class="radius-input" value="800" step="100">
            <span>м</span>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="pedestrian">🚶 Пешком</button>
            <button class="mode-btn" data-mode="auto">🚗 Авто</button>
        </div>
        <button class="reset-btn" onclick="resetAll()">🔄 Сбросить</button>
        <div class="stats-container" id="statsContainer"></div>
    </div>

    <div class="main-content">
        <div class="sidebar-left">
            <div class="section-header"><h3>🏫 Школы</h3><div class="stats-row" id="schoolStatsRow"></div></div>
            <div id="schoolsList" class="objects-list"><div class="loading">Выберите округ</div></div>
        </div>
        <div class="map-container">
            <div id="map"></div>
        </div>
        <div class="sidebar-right">
            <div class="section-header"><h3>🏠 Детские сады</h3><div class="stats-row" id="kindergartenStatsRow"></div></div>
            <div id="kindergartensList" class="objects-list"><div class="loading">Выберите округ</div></div>
        </div>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU"></script>
<script>
    // Точный список округов
    const DISTRICTS = [
        "Балашиха", "Богородский", "Бронницы", "Власиха", "Волоколамск",
        "Воскресенск", "Восход", "Дмитров", "Долгопрудный", "Домодедово",
        "Дубна", "Егорьевск", "Жуковский", "Зарайск", "Звездный городок",
        "Истра", "Кашира", "Клин", "Коломна", "Котельники",
        "Красногорск", "Краснознаменск", "Королев", "Ленинский", "Лобня",
        "Лосино-Петровский", "Лотошино", "Луховицы", "Лыткарино", "Люберцы",
        "Можайск", "Молодежный", "Мытищи", "Наро-Фоминский", "Одинцовский",
        "Орехово-Зуево", "Павловский Посад", "Подольск", "Пушкинский", "Раменский",
        "Реутов", "Руза", "Сергиево-Посадский", "Серебряные Пруды", "Серпухов",
        "Солнечногорск", "Ступино", "Талдом", "Фрязино", "Химки",
        "Черноголовка", "Чехов", "Шатура", "Шаховская", "Щелково", "Электросталь"
    ];
    
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTK9GH4MFpbHAJfZpdMtSUoZ-cEhLyGP5TmVdUSvW8rwIRdH6n5V_erDA21R-hMsL3wAVWsJTwdObae/pub?output=csv';
    
    let map, allObjects = [], currentDistrict = '', placemarks = [], radiusRoutes = [];
    let currentRadius = 800, currentMode = 'pedestrian', currentCenterPoint = null, currentUserPlacemark = null;
    let geocodeCache = new Map();

    ymaps.ready(() => {
        map = new ymaps.Map('map', { center: [55.7, 37.6], zoom: 10, controls: ['zoomControl'] });
        initSelect();
        loadData();
        setupListeners();
    });

    function initSelect() {
        const select = document.getElementById('districtSelect');
        select.innerHTML = '<option value="">-- Выберите округ --</option>';
        DISTRICTS.forEach(d => { select.innerHTML += `<option value="${d}">${d}</option>`; });
    }

    async function loadData() {
        try {
            const resp = await fetch(SHEET_URL);
            const text = await resp.text();
            allObjects = parseCSV(text);
            console.log(`Загружено ${allObjects.length} объектов`);
        } catch(e) { console.error(e); }
    }

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const result = [];
        
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            
            // Простой парсинг CSV
            const values = [];
            let inQuote = false, current = '';
            for (let j = 0; j < line.length; j++) {
                const ch = line[j];
                if (ch === '"') inQuote = !inQuote;
                else if (ch === ',' && !inQuote) { values.push(current); current = ''; }
                else current += ch;
            }
            values.push(current);
            
            const clean = values.map(v => v.replace(/^"|"$/g, '').trim());
            if (clean.length < 5) continue;
            
            const districtRaw = clean[2] || '';
            let district = districtRaw.replace(' г.о.', '').replace(' городской округ', '').replace(' район', '');
            if (district === 'Ленинский г.о.') district = 'Ленинский';
            if (district === 'Талдомский') district = 'Талдом';
            
            // Проверяем, есть ли округ в нашем списке
            if (!DISTRICTS.includes(district)) continue;
            
            const typeRaw = clean[1] || '';
            const isKindergarten = typeRaw.toLowerCase().includes('детский сад') || typeRaw === 'Детский сад';
            
            // Вычисляем загрузку
            let load = clean[9] || '';
            if (load && load.startsWith('=')) {
                const cap = parseFloat(clean[7]?.replace(',', '.'));
                const fact = parseFloat(clean[8]?.replace(',', '.'));
                if (cap && cap > 0 && fact) load = ((fact / cap) * 100).toFixed(1);
                else load = '';
            } else if (load) {
                load = load.replace('%', '').trim();
            }
            
            result.push({
                id: `obj_${i}`,
                type: isKindergarten ? 'kindergarten' : 'school',
                district: district,
                name: clean[3] || '',
                address: clean[4] || '',
                buildYear: clean[5] || '',
                area: clean[6]?.replace(',', '.') || '',
                capacity: clean[7]?.replace(',', '.') || '',
                fact: clean[8]?.replace(',', '.') || '',
                loadPercent: load,
                secondShift: clean[10] || '',
                status: clean[11] || '',
                repairYear: clean[12] || '',
                coordinates: null
            });
        }
        return result;
    }

    function setupListeners() {
        document.getElementById('districtSelect').onchange = (e) => {
            currentDistrict = e.target.value;
            if (currentDistrict) renderObjectsForDistrict();
            else clearAll();
        };
        document.getElementById('searchInput').oninput = (e) => {
            if (currentDistrict) filterSearch(e.target.value);
        };
        document.getElementById('radiusInput').onchange = (e) => {
            currentRadius = parseInt(e.target.value) || 800;
            if (currentCenterPoint) updateAccessibility(currentCenterPoint);
        };
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                if (currentCenterPoint) updateAccessibility(currentCenterPoint);
            };
        });
        map.events.add('click', (e) => {
            currentCenterPoint = e.get('coords');
            updateAccessibility(currentCenterPoint);
            if (currentUserPlacemark) map.geoObjects.remove(currentUserPlacemark);
            currentUserPlacemark = new ymaps.Placemark(currentCenterPoint, { hintContent: 'Центр' }, { preset: 'islands#circleIcon', iconColor: '#ef4444' });
            map.geoObjects.add(currentUserPlacemark);
        });
    }

    async function renderObjectsForDistrict() {
        const objects = allObjects.filter(o => o.district === currentDistrict);
        if (!objects.length) {
            document.getElementById('schoolsList').innerHTML = '<div class="loading">Нет объектов</div>';
            document.getElementById('kindergartensList').innerHTML = '<div class="loading">Нет объектов</div>';
            return;
        }
        
        document.getElementById('schoolsList').innerHTML = '<div class="loading">Загрузка координат...</div>';
        document.getElementById('kindergartensList').innerHTML = '<div class="loading">Загрузка координат...</div>';
        
        // Геокодируем
        const progressBar = document.getElementById('progressBar');
        for (let i = 0; i < objects.length; i++) {
            const obj = objects[i];
            progressBar.style.width = `${(i / objects.length) * 100}%`;
            if (obj.address && !obj.coordinates) {
                const coords = await geocode(obj.address);
                if (coords) obj.coordinates = coords;
            }
        }
        progressBar.style.width = '0%';
        
        // Очищаем старые метки
        placemarks.forEach(p => map.geoObjects.remove(p));
        placemarks = [];
        
        // Создаём новые
        objects.forEach(obj => {
            if (!obj.coordinates) return;
            const color = obj.type === 'school' ? '#3b82f6' : '#22c55e';
            const pm = new ymaps.Placemark([obj.coordinates.lat, obj.coordinates.lng], {
                balloonContent: `<b>${obj.name}</b><br>📍 ${obj.address}<br>${obj.buildYear ? `🏛️ ${obj.buildYear}<br>` : ''}${obj.area ? `📐 ${obj.area} м²<br>` : ''}`,
                hintContent: obj.name
            }, { preset: 'islands#circleIcon', iconColor: color });
            pm.events.add('click', () => showInfo(obj));
            placemarks.push(pm);
            map.geoObjects.add(pm);
        });
        
        updateStats(objects);
        renderLists(objects);
        
        const first = objects.find(o => o.coordinates);
        if (first) map.setCenter([first.coordinates.lat, first.coordinates.lng], 11);
    }

    async function geocode(address) {
        if (!address) return null;
        if (geocodeCache.has(address)) return geocodeCache.get(address);
        
        let clean = address.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        if (!clean.toLowerCase().includes('московская')) clean += ', Московская область';
        
        try {
            const url = `https://geocode-maps.yandex.ru/1.x/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&geocode=${encodeURIComponent(clean)}&format=json`;
            const resp = await fetch(url);
            const data = await resp.json();
            const pos = data.response?.GeoObjectCollection?.featureMember?.[0]?.GeoObject?.Point?.pos;
            if (pos) {
                const [lng, lat] = pos.split(' ');
                const coords = { lat: parseFloat(lat), lng: parseFloat(lng) };
                geocodeCache.set(address, coords);
                return coords;
            }
        } catch(e) {}
        geocodeCache.set(address, null);
        return null;
    }

    function showInfo(obj) {
        const old = document.querySelector('.info-panel');
        if (old) old.remove();
        
        const panel = document.createElement('div');
        panel.className = 'info-panel';
        panel.innerHTML = `
            <button onclick="this.parentElement.remove()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;">×</button>
            <h3>${obj.name || 'Без названия'}</h3>
            <div style="margin:8px 0"><b>📍 Адрес:</b><br>${obj.address || '—'}</div>
            ${obj.buildYear ? `<div><b>🏛️ Год постройки:</b> ${obj.buildYear}</div>` : ''}
            ${obj.area ? `<div><b>📐 Площадь:</b> ${obj.area} м²</div>` : ''}
            ${obj.capacity ? `<div><b>👥 Вместимость:</b> ${parseInt(obj.capacity).toLocaleString()} мест</div>` : ''}
            ${obj.fact ? `<div><b>📋 Факт:</b> ${parseInt(obj.fact).toLocaleString()} чел.</div>` : ''}
            ${obj.loadPercent ? `<div><b>📊 Загрузка:</b> ${obj.loadPercent}%</div>` : ''}
            ${obj.secondShift ? `<div><b>🕐 2-я смена:</b> ${parseInt(obj.secondShift).toLocaleString()}</div>` : ''}
            ${obj.status ? `<div><b>📋 Статус:</b> ${obj.status}</div>` : ''}
            ${obj.repairYear ? `<div><b>🔧 Год ремонта:</b> ${obj.repairYear}</div>` : ''}
        `;
        map.container.appendChild(panel);
        
        if (obj.coordinates) map.setCenter([obj.coordinates.lat, obj.coordinates.lng], 17);
        
        document.querySelectorAll('.object-card').forEach(c => c.classList.remove('active'));
        const card = document.querySelector(`.object-card[data-id="${obj.id}"]`);
        if (card) card.classList.add('active');
    }

    function updateStats(objects) {
        const schools = objects.filter(o => o.type === 'school');
        const kgs = objects.filter(o => o.type === 'kindergarten');
        
        const schoolCap = schools.reduce((s,o) => s + (parseFloat(o.capacity)||0), 0);
        const schoolFact = schools.reduce((s,o) => s + (parseFloat(o.fact)||0), 0);
        const schoolShift = schools.reduce((s,o) => s + (parseFloat(o.secondShift)||0), 0);
        const schoolLoad = schoolCap ? Math.round((schoolFact/schoolCap)*100) : 0;
        
        const kgCap = kgs.reduce((s,o) => s + (parseFloat(o.capacity)||0), 0);
        const kgFact = kgs.reduce((s,o) => s + (parseFloat(o.fact)||0), 0);
        const kgQueue = Math.max(0, kgFact - kgCap);
        const kgLoad = kgCap ? Math.round((kgFact/kgCap)*100) : 0;
        
        document.getElementById('schoolStatsRow').innerHTML = `
            <span>📐 Мощность: ${schoolCap.toLocaleString()}</span>
            <span>👥 Факт: ${schoolFact.toLocaleString()}</span>
            <span>🕐 2-я смена: ${schoolShift.toLocaleString()}</span>
            <span>📊 Загрузка: <b>${schoolLoad}%</b></span>
        `;
        document.getElementById('kindergartenStatsRow').innerHTML = `
            <span>📐 Мощность: ${kgCap.toLocaleString()}</span>
            <span>👥 Факт: ${kgFact.toLocaleString()}</span>
            <span>⏳ Очередь: ${kgQueue.toLocaleString()}</span>
            <span>📊 Загрузка: <b>${kgLoad}%</b></span>
        `;
        
        document.getElementById('statsContainer').innerHTML = `
            <div class="stat-block"><h4>📊 Всего</h4><div class="stat-numbers">
                <div class="stat-item"><span class="stat-label">Школ</span><span>${schools.length}</span></div>
                <div class="stat-item"><span class="stat-label">Садов</span><span>${kgs.length}</span></div>
                <div class="stat-item"><span class="stat-label">Всего мест</span><span>${(schoolCap+kgCap).toLocaleString()}</span></div>
                <div class="stat-item"><span class="stat-label">Всего детей</span><span>${(schoolFact+kgFact).toLocaleString()}</span></div>
            </div></div>
        `;
    }

    function renderLists(objects) {
        const schools = objects.filter(o => o.type === 'school');
        const kgs = objects.filter(o => o.type === 'kindergarten');
        renderList('schoolsList', schools);
        renderList('kindergartensList', kgs);
    }

    function renderList(containerId, objects) {
        const container = document.getElementById(containerId);
        if (!objects.length) { container.innerHTML = '<div class="loading">Нет объектов</div>'; return; }
        
        container.innerHTML = '';
        objects.forEach(obj => {
            const load = parseFloat(obj.loadPercent);
            const loadColor = load > 120 ? '#ef4444' : (load > 100 ? '#e8a000' : '#22c55e');
            const card = document.createElement('div');
            card.className = 'object-card';
            card.dataset.id = obj.id;
            card.innerHTML = `
                <div class="object-name"><span class="object-badge ${obj.type === 'school' ? 'badge-school' : 'badge-kindergarten'}">${obj.type === 'school' ? '🏫 Школа' : '🏠 Детский сад'}</span> ${obj.name || 'Без названия'}</div>
                <div class="object-address">📍 ${obj.address || '—'}</div>
                <div class="object-stats">
                    ${obj.buildYear ? `🏛️ ${obj.buildYear}` : ''}
                    ${obj.area ? `📐 ${obj.area} м²` : ''}
                    ${obj.capacity ? `🎓 ${parseInt(obj.capacity).toLocaleString()} мест` : ''}
                    ${obj.fact ? `👥 ${parseInt(obj.fact).toLocaleString()} чел.` : ''}
                </div>
                ${obj.loadPercent ? `<div class="load-bar"><div class="load-bar-fill" style="width:${Math.min(load,200)}%;background:${loadColor}"></div></div><div class="object-stats">📊 ${obj.loadPercent}%</div>` : ''}
                <div class="route-info"></div>
            `;
            card.onclick = () => showInfo(obj);
            container.appendChild(card);
        });
    }

    function filterSearch(term) {
        if (!term.trim()) {
            const objects = allObjects.filter(o => o.district === currentDistrict);
            renderLists(objects);
            return;
        }
        const t = term.toLowerCase();
        const filtered = allObjects.filter(o => o.district === currentDistrict && 
            ((o.name && o.name.toLowerCase().includes(t)) || (o.address && o.address.toLowerCase().includes(t))));
        renderList('schoolsList', filtered.filter(o => o.type === 'school'));
        renderList('kindergartensList', filtered.filter(o => o.type === 'kindergarten'));
    }

    function updateAccessibility(center) {
        radiusRoutes.forEach(r => { if(r && map.geoObjects.indexOf(r) !== -1) map.geoObjects.remove(r); });
        radiusRoutes = [];
        
        const objects = allObjects.filter(o => o.district === currentDistrict);
        const inRadius = objects.filter(o => o.coordinates && getDistance(center, [o.coordinates.lat, o.coordinates.lng]) <= currentRadius);
        
        objects.forEach(o => {
            if (!o.coordinates) return;
            const pm = placemarks.find(p => {
                const c = p.geometry.getCoordinates();
                return c[0] === o.coordinates.lat && c[1] === o.coordinates.lng;
            });
            if (pm) {
                const inR = inRadius.includes(o);
                pm.options.set('iconColor', inR ? (o.type === 'school' ? '#3b82f6' : '#22c55e') : '#94a3b8');
                pm.options.set('opacity', inR ? 1 : 0.5);
            }
        });
        
        inRadius.forEach(o => buildRoute(center, o));
        
        const inIds = new Set(inRadius.map(o => o.id));
        const schools = objects.filter(o => o.type === 'school').sort((a,b) => (inIds.has(b.id) ? 1 : 0) - (inIds.has(a.id) ? 1 : 0));
        const kgs = objects.filter(o => o.type === 'kindergarten').sort((a,b) => (inIds.has(b.id) ? 1 : 0) - (inIds.has(a.id) ? 1 : 0));
        renderList('schoolsList', schools);
        renderList('kindergartensList', kgs);
    }

    function getDistance(c1, c2) {
        const R = 6371000;
        const lat1 = c1[0] * Math.PI/180, lat2 = c2[0] * Math.PI/180;
        const dlat = (c2[0]-c1[0]) * Math.PI/180, dlng = (c2[1]-c1[1]) * Math.PI/180;
        const a = Math.sin(dlat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dlng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function buildRoute(start, obj) {
        const mode = currentMode === 'pedestrian' ? 'pedestrian' : 'auto';
        try {
            const route = new ymaps.multiRouter.MultiRoute({ referencePoints: [start, [obj.coordinates.lat, obj.coordinates.lng]], params: { routingMode: mode } }, { opacity: 0.4, strokeColor: '#3b82f6' });
            route.events.add('add', () => {
                const active = route.getActiveRoute();
                if(active) {
                    const dist = active.properties.get('distance')?.text || '';
                    const time = active.properties.get('duration')?.text || '';
                    const card = document.querySelector(`.object-card[data-id="${obj.id}"]`);
                    if(card) card.querySelector('.route-info').innerHTML = `🚶 ${dist} · ⏱️ ${time}`;
                }
            });
            map.geoObjects.add(route);
            radiusRoutes.push(route);
        } catch(e) {}
    }

    function resetAll() {
        currentCenterPoint = null;
        radiusRoutes.forEach(r => { if(r && map.geoObjects.indexOf(r) !== -1) map.geoObjects.remove(r); });
        radiusRoutes = [];
        if(currentUserPlacemark) map.geoObjects.remove(currentUserPlacemark);
        currentUserPlacemark = null;
        document.getElementById('radiusInput').value = '800';
        currentRadius = 800;
        document.querySelector('.mode-btn[data-mode="pedestrian"]').click();
        document.getElementById('searchInput').value = '';
        if(currentDistrict) renderObjectsForDistrict();
    }

    function clearAll() {
        placemarks.forEach(p => { if(p && map.geoObjects.indexOf(p) !== -1) map.geoObjects.remove(p); });
        placemarks = [];
        radiusRoutes.forEach(r => { if(r && map.geoObjects.indexOf(r) !== -1) map.geoObjects.remove(r); });
        radiusRoutes = [];
        if(currentUserPlacemark) map.geoObjects.remove(currentUserPlacemark);
        currentUserPlacemark = null;
        document.getElementById('schoolsList').innerHTML = '<div class="loading">Выберите округ</div>';
        document.getElementById('kindergartensList').innerHTML = '<div class="loading">Выберите округ</div>';
        document.getElementById('schoolStatsRow').innerHTML = '';
        document.getElementById('kindergartenStatsRow').innerHTML = '';
        document.getElementById('statsContainer').innerHTML = '';
    }
</script>
</body>
</html>
