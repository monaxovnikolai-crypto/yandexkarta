<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карта школ и детских садов Московской области</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; background: #f0f2f5; }
        
        .app { display: flex; height: 100vh; flex-direction: row; }
        
        /* КАРТА СЛЕВА */
        .map-container { flex: 2; position: relative; min-width: 55%; }
        #map { width: 100%; height: 100%; }
        
        /* ПАНЕЛЬ СПРАВА */
        .sidebar { width: 420px; background: #f8fafc; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        
        .sidebar-header { padding: 16px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .sidebar-header h1 { font-size: 1.2rem; font-weight: 600; }
        .sidebar-header p { font-size: 0.7rem; color: #64748b; margin-top: 4px; }
        
        /* Поиск */
        .search-section { padding: 12px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .search-input { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #3b82f6; }
        .search-results { margin-top: 8px; max-height: 150px; overflow-y: auto; }
        .search-item { padding: 8px 12px; background: #f1f5f9; border-radius: 8px; margin-bottom: 4px; cursor: pointer; font-size: 12px; }
        .search-item:hover { background: #e2e8f0; }
        
        /* Фильтр округа */
        .filter-section { padding: 12px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .filter-section label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 6px; }
        .district-select { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; background: white; cursor: pointer; }
        
        /* Радиус и режим */
        .radius-section { padding: 12px 20px; background: white; border-bottom: 1px solid #e2e8f0; display: none; }
        .radius-section label { font-size: 11px; font-weight: 600; color: #64748b; display: block; margin-bottom: 6px; }
        .radius-slider { width: 100%; }
        .mode-buttons { display: flex; gap: 8px; margin-top: 8px; }
        .mode-btn { flex: 1; padding: 6px; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .mode-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        
        /* Статистика */
        .stats { padding: 12px 20px; background: #eef2ff; display: flex; justify-content: space-between; font-size: 13px; }
        .stats-item { text-align: center; flex: 1; }
        .stats-value { font-size: 20px; font-weight: 700; }
        .stats-label { font-size: 10px; color: #64748b; }
        .school-stats .stats-value { color: #3b82f6; }
        .kindergarten-stats .stats-value { color: #22c55e; }
        
        /* Таблицы объектов */
        .tables-section { flex: 1; overflow-y: auto; padding: 12px; }
        .table-title { font-size: 14px; font-weight: 600; margin: 12px 0 8px; padding-bottom: 4px; border-bottom: 2px solid; }
        .table-title.school { border-color: #3b82f6; color: #1e40af; }
        .table-title.kindergarten { border-color: #22c55e; color: #166534; }
        .object-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 16px; background: white; border-radius: 12px; overflow: hidden; }
        .object-table th { background: #f1f5f9; padding: 8px 6px; text-align: left; font-weight: 600; color: #1e293b; border-bottom: 1px solid #e2e8f0; }
        .object-table td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; color: #334155; }
        .object-table tr:hover { background: #f8fafc; cursor: pointer; }
        .object-table .school-row:hover { background: #eff6ff; }
        .object-table .kindergarten-row:hover { background: #f0fdf4; }
        .load-bar-small { height: 3px; background: #e2e8f0; border-radius: 2px; width: 60px; overflow: hidden; }
        .load-bar-fill-small { height: 100%; border-radius: 2px; }
        
        .clear-point-btn { position: absolute; bottom: 20px; left: 20px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 16px; font-size: 13px; cursor: pointer; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .clear-point-btn:hover { background: #f1f5f9; }
        
        .loading { padding: 40px; text-align: center; color: #64748b; }
        
        @media (max-width: 900px) { .sidebar { width: 360px; } .object-table { font-size: 9px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="map-container">
        <div id="map"></div>
        <button class="clear-point-btn" id="clearPointBtn">🗑️ Очистить точку</button>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🏫 Образовательная инфраструктура МО</h1>
            <p>Школы и детские сады</p>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по названию или адресу...">
            <div id="searchResults" class="search-results"></div>
        </div>
        
        <div class="filter-section">
            <label>🏙️ Городской округ</label>
            <select id="districtSelect" class="district-select">
                <option value="">-- Выберите округ --</option>
            </select>
        </div>
        
        <div id="radiusSection" class="radius-section">
            <label>🎯 Радиус доступности (метров)</label>
            <input type="range" id="radiusSlider" class="radius-slider" min="100" max="2000" step="50" value="800">
            <span id="radiusValue" style="font-size:12px; color:#3b82f6;">800 м</span>
            <div class="mode-buttons">
                <button id="modePedestrian" class="mode-btn active">🚶 Пешком</button>
                <button id="modeCar" class="mode-btn">🚗 На машине</button>
            </div>
        </div>
        
        <div id="statsPanel" class="stats" style="display: none;">
            <div class="stats-item school-stats">
                <div class="stats-value" id="schoolCount">0</div>
                <div class="stats-label">Школ</div>
                <div style="font-size:10px" id="schoolCapacity">0 мест</div>
                <div style="font-size:10px" id="schoolLoad">0% ср.</div>
            </div>
            <div class="stats-item kindergarten-stats">
                <div class="stats-value" id="kindergartenCount">0</div>
                <div class="stats-label">Детских садов</div>
                <div style="font-size:10px" id="kindergartenCapacity">0 мест</div>
                <div style="font-size:10px" id="kindergartenLoad">0% ср.</div>
            </div>
        </div>
        
        <div class="tables-section" id="tablesSection">
            <div class="loading">Выберите округ для загрузки данных</div>
        </div>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU"></script>
<script>
    const WORKER_URL = 'https://yandexkarty.monaxovnikolai-31d.workers.dev';
    
    let map = null;
    let placemarks = [];
    let currentObjects = [];
    let currentDistrict = '';
    let userPoint = null;
    let userPointPlacemark = null;
    let radius = 800;
    let travelMode = 'pedestrian'; // 'pedestrian' или 'car'
    let currentRoutes = [];
    let activeRoute = null;
    
    ymaps.ready(() => {
        map = new ymaps.Map('map', {
            center: [55.7, 37.6],
            zoom: 10,
            controls: ['zoomControl', 'fullscreenControl', 'geolocationControl']
        });
        
        map.events.add('click', (e) => {
            const coords = e.get('coords');
            setUserPoint(coords);
        });
        
        loadDistricts();
        setupEventListeners();
    });
    
    function setupEventListeners() {
        document.getElementById('districtSelect').addEventListener('change', (e) => {
            if (e.target.value) {
                clearUserPoint();
                loadObjects(e.target.value);
            } else {
                clearMap();
                document.getElementById('tablesSection').innerHTML = '<div class="loading">Выберите округ для загрузки данных</div>';
                document.getElementById('statsPanel').style.display = 'none';
            }
        });
        
        document.getElementById('radiusSlider').addEventListener('input', (e) => {
            radius = parseInt(e.target.value);
            document.getElementById('radiusValue').textContent = radius + ' м';
            if (userPoint) updatePlacemarksOpacity();
        });
        
        document.getElementById('modePedestrian').addEventListener('click', () => {
            travelMode = 'pedestrian';
            document.getElementById('modePedestrian').classList.add('active');
            document.getElementById('modeCar').classList.remove('active');
            if (userPoint) updatePlacemarksOpacity();
        });
        
        document.getElementById('modeCar').addEventListener('click', () => {
            travelMode = 'car';
            document.getElementById('modeCar').classList.add('active');
            document.getElementById('modePedestrian').classList.remove('active');
            if (userPoint) updatePlacemarksOpacity();
        });
        
        document.getElementById('clearPointBtn').addEventListener('click', () => clearUserPoint());
        
        // Поиск с debounce
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchObjects(e.target.value), 500);
        });
    }
    
    async function searchObjects(query) {
        if (!query || query.length < 2) {
            document.getElementById('searchResults').innerHTML = '';
            return;
        }
        try {
            const response = await fetch(`${WORKER_URL}/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            const resultsDiv = document.getElementById('searchResults');
            if (data.results && data.results.length > 0) {
                resultsDiv.innerHTML = data.results.map(r => `
                    <div class="search-item" data-name="${r.name}" data-district="${r.district}">
                        <strong>${r.name}</strong><br>
                        <span style="font-size:10px; color:#64748b">${r.address} • ${r.district}</span>
                    </div>
                `).join('');
                document.querySelectorAll('.search-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const district = el.dataset.district;
                        const select = document.getElementById('districtSelect');
                        if (select.querySelector(`option[value="${district}"]`)) {
                            select.value = district;
                            loadObjects(district);
                            document.getElementById('searchResults').innerHTML = '';
                            document.getElementById('searchInput').value = '';
                        }
                    });
                });
            } else {
                resultsDiv.innerHTML = '<div style="padding:8px; color:#64748b; font-size:12px;">Ничего не найдено</div>';
            }
        } catch(err) { console.error(err); }
    }
    
    async function loadDistricts() {
        try {
            const response = await fetch(`${WORKER_URL}/districts`);
            const data = await response.json();
            const select = document.getElementById('districtSelect');
            if (data.districts && data.districts.length > 0) {
                select.innerHTML = '<option value="">-- Выберите округ --</option>' + 
                    data.districts.map(d => `<option value="${d}">${d}</option>`).join('');
            } else {
                select.innerHTML = '<option value="">Нет данных</option>';
            }
        } catch(err) {
            console.error(err);
            document.getElementById('districtSelect').innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }
    
    async function loadObjects(district) {
        currentDistrict = district;
        document.getElementById('tablesSection').innerHTML = '<div class="loading">Загрузка объектов...</div>';
        clearMap();
        clearUserPoint();
        
        try {
            const response = await fetch(`${WORKER_URL}/objects?district=${encodeURIComponent(district)}`);
            const data = await response.json();
            
            if (data.objects && data.objects.length > 0) {
                currentObjects = data.objects;
                updateStats(data.objects);
                renderTables(data.objects);
                await geocodeAllObjects(data.objects);
                document.getElementById('statsPanel').style.display = 'flex';
            } else {
                document.getElementById('tablesSection').innerHTML = '<div class="loading">Нет объектов в выбранном округе</div>';
                document.getElementById('statsPanel').style.display = 'none';
            }
        } catch(err) {
            console.error(err);
            document.getElementById('tablesSection').innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
        }
    }
    
    function updateStats(objects) {
        const schools = objects.filter(o => o.type === 'school');
        const kindergartens = objects.filter(o => o.type === 'kindergarten');
        
        const schoolCapacity = schools.reduce((sum, s) => sum + (parseInt(s.capacity) || 0), 0);
        const schoolLoad = schools.reduce((sum, s) => sum + (parseInt(s.loadPercent) || 0), 0) / (schools.length || 1);
        const kinderCapacity = kindergartens.reduce((sum, k) => sum + (parseInt(k.capacity) || 0), 0);
        const kinderLoad = kindergartens.reduce((sum, k) => sum + (parseInt(k.loadPercent) || 0), 0) / (kindergartens.length || 1);
        
        document.getElementById('schoolCount').textContent = schools.length;
        document.getElementById('schoolCapacity').textContent = schoolCapacity.toLocaleString() + ' мест';
        document.getElementById('schoolLoad').textContent = Math.round(schoolLoad) + '% ср.';
        document.getElementById('kindergartenCount').textContent = kindergartens.length;
        document.getElementById('kindergartenCapacity').textContent = kinderCapacity.toLocaleString() + ' мест';
        document.getElementById('kindergartenLoad').textContent = Math.round(kinderLoad) + '% ср.';
    }
    
    function renderTables(objects) {
        const schools = objects.filter(o => o.type === 'school');
        const kindergartens = objects.filter(o => o.type === 'kindergarten');
        
        const renderTableRows = (items, type) => {
            return items.map((item, idx) => {
                const loadPercent = parseInt(item.loadPercent) || 0;
                const loadColor = loadPercent > 120 ? '#ef4444' : (loadPercent > 100 ? '#e8a000' : '#22c55e');
                return `
                    <tr class="${type}-row" data-id="${item.id}">
                        <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${item.name}">${item.name}</td>
                        <td style="max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${item.address}">${item.address}</td>
                        <td>${item.buildYear || '-'}</td>
                        <td>${item.area ? Math.round(parseFloat(item.area)) + ' м²' : '-'}</td>
                        <td>${item.capacity || '-'}</td>
                        <td>${item.fact || '-'}</td>
                        <td style="min-width:60px">
                            ${loadPercent}%
                            <div class="load-bar-small"><div class="load-bar-fill-small" style="width:${Math.min(loadPercent,200)}%; background:${loadColor}"></div></div>
                        </td>
                        <td>${item.secondShift || '-'}</td>
                        <td>${item.status || '-'}</td>
                        <td>${item.repairYear || '-'}</td>
                    </tr>
                `;
            }).join('');
        };
        
        const html = `
            <div class="table-title school">🏫 Школы (${schools.length})</div>
            <table class="object-table">
                <thead><tr>
                    <th>Наименование</th><th>Адрес</th><th>Год пост.</th><th>Площадь</th><th>Мощность</th><th>Факт</th><th>% загрузки</th><th>2-я смена</th><th>Статус</th><th>Ремонт</th>
                </tr></thead>
                <tbody>${renderTableRows(schools, 'school')}</tbody>
            </table>
            <div class="table-title kindergarten">🏫 Детские сады (${kindergartens.length})</div>
            <table class="object-table">
                <thead><tr>
                    <th>Наименование</th><th>Адрес</th><th>Год пост.</th><th>Площадь</th><th>Мощность</th><th>Факт</th><th>% загрузки</th><th>Очередь</th><th>Статус</th><th>Ремонт</th>
                </tr></thead>
                <tbody>${renderTableRows(kindergartens, 'kindergarten')}</tbody>
            </table>
        `;
        
        document.getElementById('tablesSection').innerHTML = html;
        
        // Клик по строке таблицы
        document.querySelectorAll('.object-table tbody tr').forEach(row => {
            row.addEventListener('click', () => {
                const id = row.dataset.id;
                const obj = currentObjects.find(o => o.id === id);
                if (obj && obj.coordinates) {
                    selectObject(obj);
                    map.setCenter([obj.coordinates.lat, obj.coordinates.lng], 16);
                }
            });
        });
    }
    
    function getObjectColor(obj, isNear = true) {
        const baseColor = obj.type === 'school' ? '#3b82f6' : '#22c55e';
        return isNear ? baseColor : (obj.type === 'school' ? '#93c5fd' : '#86efac');
    }
    
    function createPlacemark(obj) {
        const loadPercent = parseInt(obj.loadPercent);
        let color = obj.type === 'school' ? '#3b82f6' : '#22c55e';
        
        const placemark = new ymaps.Placemark(
            [obj.coordinates.lat, obj.coordinates.lng],
            {
                balloonContentHeader: obj.name,
                balloonContentBody: `
                    <strong>${obj.type === 'school' ? 'Школа' : 'Детский сад'}</strong><br>
                    📍 ${obj.address}<br>
                    ${obj.capacity ? `👥 Вместимость: ${obj.capacity} мест<br>` : ''}
                    ${obj.loadPercent ? `📊 Загрузка: ${obj.loadPercent}%<br>` : ''}
                    ${obj.secondShift ? `🕐 ${obj.secondShift}<br>` : ''}
                    ${obj.status ? `📋 ${obj.status}` : ''}
                `,
                hintContent: obj.name
            },
            { preset: 'islands#circleIcon', iconColor: color }
        );
        
        placemark.userData = { objectId: obj.id, originalColor: color, type: obj.type };
        placemark.events.add('click', () => selectObject(obj));
        
        return placemark;
    }
    
    function selectObject(obj) {
        // Показать в таблице
        document.querySelectorAll('.object-table tbody tr').forEach(row => {
            row.style.background = row.dataset.id === obj.id ? (obj.type === 'school' ? '#eff6ff' : '#f0fdf4') : '';
        });
        
        // Подсветить маршрут
        if (userPoint) highlightRouteToObject(obj.id);
        
        // Открыть балун
        const pm = placemarks.find(p => p.userData?.objectId === obj.id);
        if (pm) pm.balloon.open();
    }
    
    async function geocodeAllObjects(objects) {
        const geocodePromises = objects.map(async (obj) => {
            if (!obj.coordinates && obj.address) {
                try {
                    const result = await ymaps.geocode(obj.address, { results: 1 });
                    const firstGeoObject = result.geoObjects.get(0);
                    if (firstGeoObject) {
                        const coords = firstGeoObject.geometry.getCoordinates();
                        obj.coordinates = { lat: coords[0], lng: coords[1] };
                        const placemark = createPlacemark(obj);
                        placemarks.push(placemark);
                        map.geoObjects.add(placemark);
                    }
                } catch(err) { console.error(`Гео ${obj.name} ошибка:`, err); }
            } else if (obj.coordinates) {
                const placemark = createPlacemark(obj);
                placemarks.push(placemark);
                map.geoObjects.add(placemark);
            }
        });
        
        await Promise.all(geocodePromises);
        
        const firstWithCoords = objects.find(o => o.coordinates);
        if (firstWithCoords) map.setCenter([firstWithCoords.coordinates.lat, firstWithCoords.coordinates.lng], 12);
    }
    
    function updatePlacemarksOpacity() {
        if (!userPoint) {
            placemarks.forEach(pm => {
                pm.options.set('iconColor', pm.userData.originalColor);
                pm.options.set('opacity', 1);
            });
            document.getElementById('radiusSection').style.display = 'none';
            return;
        }
        
        document.getElementById('radiusSection').style.display = 'block';
        const point = [userPoint.lat, userPoint.lng];
        let nearCount = 0;
        
        placemarks.forEach(pm => {
            const coords = pm.geometry.getCoordinates();
            const distance = ymaps.coordSystem.geo.getDistance(point, coords);
            const isNear = distance <= radius;
            if (isNear) nearCount++;
            const color = getObjectColor(pm.userData, isNear);
            pm.options.set('iconColor', color);
            pm.options.set('opacity', isNear ? 1 : 0.4);
        });
        
        buildRoutesFromPoint();
    }
    
    async function buildRoutesFromPoint() {
        currentRoutes.forEach(route => {
            if (route && map.geoObjects.indexOf(route) !== -1) map.geoObjects.remove(route);
        });
        currentRoutes = [];
        
        if (!userPoint) return;
        
        const pointCoords = [userPoint.lat, userPoint.lng];
        const mode = travelMode === 'car' ? 'auto' : 'pedestrian';
        
        for (const obj of currentObjects) {
            if (!obj.coordinates) continue;
            const targetCoords = [obj.coordinates.lat, obj.coordinates.lng];
            const distance = ymaps.coordSystem.geo.getDistance(pointCoords, targetCoords);
            
            if (distance <= radius * 1.2) {
                try {
                    const multiRoute = new ymaps.multiRouter.MultiRoute({
                        referencePoints: [pointCoords, targetCoords],
                        params: { routingMode: mode }
                    }, { boundsAutoApply: false, wayPointDraggable: false, opacity: 0.3, strokeColor: '#3b82f6', strokeWidth: 3 });
                    
                    multiRoute.userData = { objectId: obj.id };
                    
                    multiRoute.model.events.add('requestsuccess', () => {
                        const routes = multiRoute.getRoutes();
                        if (routes.length > 0) {
                            const dist = routes[0].properties.get('distance');
                            if (dist) multiRoute.userData.distanceText = dist.text;
                        }
                    });
                    
                    map.geoObjects.add(multiRoute);
                    currentRoutes.push(multiRoute);
                } catch(e) { console.error('Маршрут ошибка:', e); }
            }
        }
    }
    
    function highlightRouteToObject(objectId) {
        currentRoutes.forEach(route => {
            if (route) {
                route.options.set('strokeColor', '#3b82f6');
                route.options.set('opacity', 0.3);
                route.options.set('strokeWidth', 3);
            }
        });
        
        const targetRoute = currentRoutes.find(r => r.userData?.objectId === objectId);
        if (targetRoute) {
            targetRoute.options.set('strokeColor', '#ef4444');
            targetRoute.options.set('opacity', 1);
            targetRoute.options.set('strokeWidth', 5);
            
            if (targetRoute.userData?.distanceText) {
                const info = document.querySelector('.stats');
                if (info) {
                    const distDiv = document.getElementById('distanceInfo') || (() => {
                        const d = document.createElement('div');
                        d.id = 'distanceInfo';
                        d.style.cssText = 'position:absolute; bottom:80px; left:20px; background:white; padding:8px 12px; border-radius:12px; font-size:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); z-index:20;';
                        document.querySelector('.map-container').appendChild(d);
                        return d;
                    })();
                    distDiv.innerHTML = `🚶 Расстояние: ${targetRoute.userData.distanceText}`;
                    distDiv.style.display = 'block';
                    setTimeout(() => { if(distDiv) distDiv.style.display = 'none'; }, 3000);
                }
            }
        }
    }
    
    function setUserPoint(coords) {
        if (userPointPlacemark) map.geoObjects.remove(userPointPlacemark);
        
        userPoint = { lat: coords[0], lng: coords[1] };
        userPointPlacemark = new ymaps.Placemark(coords, {
            hintContent: 'Центр поиска',
            balloonContent: `Радиус: ${radius} м`
        }, { preset: 'islands#redCircleIcon', draggable: true });
        
        userPointPlacemark.events.add('dragend', (e) => {
            const newCoords = e.get('target').geometry.getCoordinates();
            userPoint = { lat: newCoords[0], lng: newCoords[1] };
            updatePlacemarksOpacity();
        });
        
        map.geoObjects.add(userPointPlacemark);
        document.getElementById('clearPointBtn').style.display = 'block';
        updatePlacemarksOpacity();
    }
    
    function clearUserPoint() {
        if (userPointPlacemark) {
            map.geoObjects.remove(userPointPlacemark);
            userPointPlacemark = null;
        }
        userPoint = null;
        
        currentRoutes.forEach(route => {
            if (route && map.geoObjects.indexOf(route) !== -1) map.geoObjects.remove(route);
        });
        currentRoutes = [];
        
        document.getElementById('clearPointBtn').style.display = 'none';
        document.getElementById('radiusSection').style.display = 'none';
        
        placemarks.forEach(pm => {
            pm.options.set('iconColor', pm.userData.originalColor);
            pm.options.set('opacity', 1);
        });
    }
    
    function clearMap() {
        if (placemarks.length) {
            placemarks.forEach(p => { if (p && map.geoObjects.indexOf(p) !== -1) map.geoObjects.remove(p); });
            placemarks = [];
        }
        currentRoutes.forEach(route => { if (route && map.geoObjects.indexOf(route) !== -1) map.geoObjects.remove(route); });
        currentRoutes = [];
        clearUserPoint();
    }
</script>
</body>
</html>
