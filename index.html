<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карта школ и детских садов Московской области</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Левая панель */
        .sidebar {
            width: 360px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }
        
        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .sidebar-header p {
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .filters {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }
        
        .filters label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            display: block;
            margin-bottom: 6px;
        }
        
        .district-select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .district-select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .stats {
            padding: 12px 20px;
            background: #eef2ff;
            font-size: 13px;
            color: #1e40af;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .objects-list {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }
        
        .object-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .object-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .object-card.active {
            border-left: 3px solid #3b82f6;
            background: #eff6ff;
        }
        
        .object-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .object-address {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 6px;
        }
        
        .object-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .badge-school {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-kindergarten {
            background: #dcfce7;
            color: #166534;
        }
        
        .loading {
            padding: 20px;
            text-align: center;
            color: #64748b;
        }
        
        /* Карта */
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* Информационная панель */
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 340px;
            max-height: 80vh;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 16px;
            z-index: 20;
            display: none;
            border: 1px solid #e2e8f0;
        }
        
        .info-panel.show {
            display: block;
        }
        
        .info-panel h3 {
            font-size: 16px;
            margin-bottom: 12px;
            padding-right: 24px;
        }
        
        .info-panel .close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .info-field {
            margin-bottom: 12px;
        }
        
        .info-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        .info-value {
            font-size: 14px;
            color: #1e293b;
        }
        
        .route-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .route-btn:hover {
            background: #2563eb;
        }
        
        .load-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .load-bar-fill {
            height: 100%;
            width: 0%;
            background: #ef4444;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
            .info-panel {
                width: 280px;
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🏫 Образовательная инфраструктура</h1>
            <p>Школы Московской области</p>
        </div>
        
        <div class="filters">
            <label>Выберите городской округ</label>
            <select id="districtSelect" class="district-select">
                <option value="">-- Загрузка округов --</option>
            </select>
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            📍 Объектов: <span id="objectCount">0</span>
        </div>
        
        <div id="objectsList" class="objects-list">
            <div class="loading">Выберите округ для загрузки объектов</div>
        </div>
    </div>
    
    <div class="map-container">
        <div id="map"></div>
        <div id="infoPanel" class="info-panel">
            <button class="close" onclick="closeInfoPanel()">×</button>
            <div id="infoContent"></div>
        </div>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU"></script>
<script>
    // URL вашего Worker
    const WORKER_URL = 'https://yandexkarty.monaxovnikolai-31d.workers.dev';
    
    let map = null;
    let placemarks = [];
    let currentObjects = [];
    let currentDistrict = '';
    let currentRoute = null;
    let currentUserPlacemark = null;
    
    // Инициализация карты
    ymaps.ready(() => {
        map = new ymaps.Map('map', {
            center: [55.7, 37.6],
            zoom: 10,
            controls: ['zoomControl', 'fullscreenControl']
        });
        
        loadDistricts();
    });
    
    // Загрузка списка округов
    async function loadDistricts() {
        try {
            const response = await fetch(`${WORKER_URL}/districts`);
            const data = await response.json();
            
            const select = document.getElementById('districtSelect');
            
            if (data.districts && data.districts.length > 0) {
                select.innerHTML = '<option value="">-- Выберите округ --</option>';
                data.districts.forEach(district => {
                    const option = document.createElement('option');
                    option.value = district;
                    option.textContent = district;
                    select.appendChild(option);
                });
            } else {
                select.innerHTML = '<option value="">Нет данных</option>';
                console.error('Нет округов:', data);
            }
            
            select.addEventListener('change', (e) => {
                if (e.target.value) {
                    loadObjects(e.target.value);
                } else {
                    clearMap();
                }
            });
            
        } catch (err) {
            console.error('Ошибка загрузки округов:', err);
            document.getElementById('districtSelect').innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }
    
    // Загрузка объектов по округу
    async function loadObjects(district) {
        currentDistrict = district;
        document.getElementById('objectsList').innerHTML = '<div class="loading">Загрузка объектов...</div>';
        clearMap();
        
        try {
            const response = await fetch(`${WORKER_URL}/objects?district=${encodeURIComponent(district)}`);
            const data = await response.json();
            
            if (data.objects && data.objects.length > 0) {
                currentObjects = data.objects;
                document.getElementById('stats').style.display = 'block';
                document.getElementById('objectCount').textContent = data.objects.length;
                renderObjectsList(data.objects);
                await geocodeAllObjects(data.objects);
            } else {
                document.getElementById('objectsList').innerHTML = '<div class="loading">Нет объектов в выбранном округе</div>';
                document.getElementById('stats').style.display = 'none';
            }
            
        } catch (err) {
            console.error('Ошибка загрузки объектов:', err);
            document.getElementById('objectsList').innerHTML = '<div class="loading">Ошибка загрузки объектов</div>';
        }
    }
    
    // Рендер списка объектов
    function renderObjectsList(objects) {
        const container = document.getElementById('objectsList');
        container.innerHTML = '';
        
        objects.forEach((obj, idx) => {
            const loadPercent = parseInt(obj.loadPercent);
            const loadColor = loadPercent > 120 ? '#ef4444' : (loadPercent > 100 ? '#e8a000' : '#22c55e');
            
            const card = document.createElement('div');
            card.className = 'object-card';
            card.setAttribute('data-id', obj.id);
            card.innerHTML = `
                <div class="object-name">
                    <span class="object-badge badge-school">🏫 Школа</span>
                    <span style="margin-left: 8px;">${obj.name || 'Без названия'}</span>
                </div>
                <div class="object-address">📍 ${obj.address || 'Адрес не указан'}</div>
                ${obj.capacity ? `<div style="font-size: 11px; color: #64748b;">👥 Вместимость: ${obj.capacity} мест</div>` : ''}
                ${obj.loadPercent ? `
                    <div style="font-size: 11px; margin-top: 6px;">
                        📊 Загрузка: ${obj.loadPercent}%
                        <div class="load-bar">
                            <div class="load-bar-fill" style="width: ${Math.min(obj.loadPercent, 200)}%; background: ${loadColor}"></div>
                        </div>
                    </div>
                ` : ''}
            `;
            card.onclick = () => {
                selectObject(obj, idx);
                if (obj.coordinates) {
                    map.setCenter([obj.coordinates.lat, obj.coordinates.lng], 16);
                }
            };
            container.appendChild(card);
        });
    }
    
    // Создание метки
    function createPlacemark(obj, idx) {
        const loadPercent = parseInt(obj.loadPercent);
        let color = '#3b82f6';
        if (loadPercent > 120) color = '#ef4444';
        else if (loadPercent > 100) color = '#e8a000';
        else if (obj.capacity && parseInt(obj.capacity) > 0) color = '#22c55e';
        
        const placemark = new ymaps.Placemark(
            [obj.coordinates.lat, obj.coordinates.lng],
            {
                balloonContentHeader: obj.name || 'Школа',
                balloonContentBody: `
                    <strong>Адрес:</strong> ${obj.address || '—'}<br>
                    ${obj.capacity ? `<strong>Вместимость:</strong> ${obj.capacity} мест<br>` : ''}
                    ${obj.loadPercent ? `<strong>Загрузка:</strong> ${obj.loadPercent}%<br>` : ''}
                    ${obj.secondShift ? `<strong>2-я смена:</strong> ${obj.secondShift} детей<br>` : ''}
                    ${obj.status ? `<strong>Статус:</strong> ${obj.status}<br>` : ''}
                    <a href="#" onclick="selectObjectById('${obj.id}'); return false;">Подробнее →</a>
                `,
                hintContent: obj.name
            },
            {
                preset: 'islands#circleIcon',
                iconColor: color
            }
        );
        
        placemark.events.add('click', () => {
            selectObject(obj, idx);
        });
        
        return placemark;
    }
    
    // Геокодирование всех объектов
    async function geocodeAllObjects(objects) {
        const geocodePromises = objects.map(async (obj, idx) => {
            if (!obj.coordinates && obj.address) {
                try {
                    const result = await ymaps.geocode(obj.address, { results: 1 });
                    const firstGeoObject = result.geoObjects.get(0);
                    if (firstGeoObject) {
                        const coords = firstGeoObject.geometry.getCoordinates();
                        obj.coordinates = { lat: coords[0], lng: coords[1] };
                        
                        const placemark = createPlacemark(obj, idx);
                        placemarks.push(placemark);
                        map.geoObjects.add(placemark);
                    }
                } catch (err) {
                    console.error(`Геокодирование для ${obj.name} не удалось:`, err);
                }
            } else if (obj.coordinates) {
                const placemark = createPlacemark(obj, idx);
                placemarks.push(placemark);
                map.geoObjects.add(placemark);
            }
        });
        
        await Promise.all(geocodePromises);
        renderObjectsList(objects);
        
        const firstWithCoords = objects.find(o => o.coordinates);
        if (firstWithCoords) {
            map.setCenter([firstWithCoords.coordinates.lat, firstWithCoords.coordinates.lng], 12);
        }
    }
    
    // Выбор объекта
    function selectObject(obj, idx) {
        document.querySelectorAll('.object-card').forEach((card, i) => {
            card.classList.toggle('active', i === idx);
        });
        showInfoPanel(obj);
        
        if (obj.coordinates) {
            buildRoute(obj.coordinates);
        }
    }
    
    function selectObjectById(id) {
        const idx = currentObjects.findIndex(o => o.id === id);
        if (idx !== -1) {
            selectObject(currentObjects[idx], idx);
        }
    }
    
    // Показать информационную панель
    function showInfoPanel(obj) {
        const panel = document.getElementById('infoPanel');
        const content = document.getElementById('infoContent');
        
        content.innerHTML = `
            <h3>${obj.name || 'Без названия'}</h3>
            <div class="info-field">
                <div class="info-label">Тип учреждения</div>
                <div class="info-value">🏫 Школа</div>
            </div>
            <div class="info-field">
                <div class="info-label">📍 Адрес</div>
                <div class="info-value">${obj.address || 'Не указан'}</div>
            </div>
            <div class="info-field">
                <div class="info-label">🏛️ Городской округ</div>
                <div class="info-value">${obj.district || 'Не указан'}</div>
            </div>
            ${obj.capacity ? `
            <div class="info-field">
                <div class="info-label">👥 Вместимость</div>
                <div class="info-value">${obj.capacity} мест</div>
            </div>
            ` : ''}
            ${obj.loadPercent ? `
            <div class="info-field">
                <div class="info-label">📊 Загрузка</div>
                <div class="info-value">${obj.loadPercent}%</div>
            </div>
            ` : ''}
            ${obj.secondShift ? `
            <div class="info-field">
                <div class="info-label">🕐 Вторая смена</div>
                <div class="info-value">${obj.secondShift} детей</div>
            </div>
            ` : ''}
            ${obj.status ? `
            <div class="info-field">
                <div class="info-label">📋 Статус</div>
                <div class="info-value">${obj.status}</div>
            </div>
            ` : ''}
            ${obj.repairYear ? `
            <div class="info-field">
                <div class="info-label">🔧 Год ремонта</div>
                <div class="info-value">${obj.repairYear}</div>
            </div>
            ` : ''}
            <button class="route-btn" onclick="buildRouteFromCurrent(${obj.coordinates ? `[${obj.coordinates.lat}, ${obj.coordinates.lng}]` : 'null'})">
                🚶 Построить маршрут
            </button>
        `;
        
        panel.classList.add('show');
    }
    
    function closeInfoPanel() {
        document.getElementById('infoPanel').classList.remove('show');
        if (currentRoute) {
            map.geoObjects.remove(currentRoute);
            currentRoute = null;
        }
    }
    
    // Построить маршрут
    async function buildRoute(targetCoords) {
        if (!targetCoords) {
            alert('Координаты объекта не определены');
            return;
        }
        
        if (!navigator.geolocation) {
            alert('Ваш браузер не поддерживает геолокацию');
            return;
        }
        
        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const userCoords = [position.coords.latitude, position.coords.longitude];
                const target = [targetCoords.lat, targetCoords.lng];
                
                if (currentRoute) {
                    map.geoObjects.remove(currentRoute);
                }
                
                try {
                    const multiRoute = new ymaps.multiRouter.MultiRoute({
                        referencePoints: [userCoords, target],
                        params: { routingMode: 'pedestrian' }
                    }, {
                        boundsAutoApply: true,
                        wayPointDraggable: false
                    });
                    
                    map.geoObjects.add(multiRoute);
                    currentRoute = multiRoute;
                    
                    if (currentUserPlacemark) {
                        map.geoObjects.remove(currentUserPlacemark);
                    }
                    currentUserPlacemark = new ymaps.Placemark(userCoords, {
                        hintContent: 'Ваше местоположение',
                        balloonContent: 'Вы здесь'
                    }, {
                        preset: 'islands#circleIcon',
                        iconColor: '#ef4444'
                    });
                    map.geoObjects.add(currentUserPlacemark);
                    
                } catch (err) {
                    console.error('Ошибка построения маршрута:', err);
                    alert('Не удалось построить маршрут');
                }
            },
            (err) => {
                alert('Не удалось определить ваше местоположение. Разрешите доступ к геолокации.');
                console.error(err);
            }
        );
    }
    
    async function buildRouteFromCurrent(coordsArray) {
        if (!coordsArray) {
            alert('Координаты объекта не определены');
            return;
        }
        await buildRoute({ lat: coordsArray[0], lng: coordsArray[1] });
    }
    
    // Очистка карты
    function clearMap() {
        if (placemarks.length) {
            placemarks.forEach(p => {
                if (p && map.geoObjects.indexOf(p) !== -1) {
                    map.geoObjects.remove(p);
                }
            });
            placemarks = [];
        }
        if (currentRoute) {
            map.geoObjects.remove(currentRoute);
            currentRoute = null;
        }
        if (currentUserPlacemark) {
            map.geoObjects.remove(currentUserPlacemark);
            currentUserPlacemark = null;
        }
        closeInfoPanel();
    }
</script>
</body>
</html>
