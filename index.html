<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Школы и детские сады</title>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU&suggest_apikey=2767d067-9642-4643-a266-33991858afda"></script>

<style>
body { margin:0; font-family:sans-serif; }
.app { display:flex; height:100vh; }
#map { flex:2; }

.sidebar {
  width:360px;
  background:#fff;
  overflow:auto;
  border-left:1px solid #ccc;
  padding:10px;
}

.item {
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
  cursor:pointer;
}
.item:hover { background:#eef5ff; }

.controls {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="app">
  <div id="map"></div>

  <div class="sidebar">
    <h3>🏫 Школы и детские сады</h3>
    <div id="list"></div>
  </div>
</div>

<div class="controls">
  <input id="search" placeholder="Введите адрес..." size="30">
  <button onclick="findAddress()">Найти</button><br><br>

  Радиус: <input id="radius" type="number" value="800"> м
  <button onclick="updateRadius()">ОК</button>
</div>

<script>
let map, center, circle, route;
let radius = 800;

ymaps.ready(init);

function init() {

  map = new ymaps.Map("map", {
    center: [55.75, 37.61],
    zoom: 13
  });

  // 🔥 подсказки адреса
  new ymaps.SuggestView('search');

  map.events.add('click', e => {
    setCenter(e.get('coords'));
  });

}

// поиск адреса
function findAddress() {
  const val = document.getElementById('search').value;

  ymaps.geocode(val).then(res => {
    const obj = res.geoObjects.get(0);
    if (!obj) return alert('Не найдено');

    const coords = obj.geometry.getCoordinates();
    map.setCenter(coords, 15);
    setCenter(coords);
  });
}

function updateRadius() {
  radius = parseInt(document.getElementById('radius').value);
  if (center) setCenter(center);
}

// установка центра
function setCenter(coords) {

  center = coords;

  map.geoObjects.removeAll();

  // центр
  const centerMark = new ymaps.Placemark(coords, {
    iconCaption: "Центр"
  }, { preset: 'islands#redIcon' });

  map.geoObjects.add(centerMark);

  // круг
  circle = new ymaps.Circle([coords, radius], {}, {
    fillColor: "#0000ff22",
    strokeColor: "#0000ff"
  });

  map.geoObjects.add(circle);

  search();
}

// 🔥 ПОИСК ТОЛЬКО РЕАЛЬНЫХ ШКОЛ И САДОВ
function search() {

  document.getElementById('list').innerHTML = "Поиск...";

  const bounds = circle.geometry.getBounds();

  Promise.all([
    ymaps.search({
      text: 'школа',
      type: 'biz',
      boundedBy: bounds,
      results: 50
    }),
    ymaps.search({
      text: 'детский сад',
      type: 'biz',
      boundedBy: bounds,
      results: 50
    })
  ]).then(results => {

    let all = [];

    results.forEach(res => {
      res.geoObjects.each(obj => {

        const name = obj.properties.get('name') || '';
        const coords = obj.geometry.getCoordinates();

        // ❗ защита от мусора
        if (!name) return;

        const low = name.toLowerCase();

        if (
          !low.includes('школ') &&
          !low.includes('лицей') &&
          !low.includes('гимназ') &&
          !low.includes('сад')
        ) return;

        const dist = ymaps.coordSystem.geo.getDistance(center, coords);
        if (dist > radius) return;

        all.push({
          name,
          coords,
          dist
        });

      });
    });

    // удаляем дубликаты
    all = all.filter((v,i,a)=>
      a.findIndex(t=>t.name===v.name)===i
    );

    all.sort((a,b)=>a.dist-b.dist);

    render(all);

  });

}

// отображение
function render(list) {

  const container = document.getElementById('list');
  container.innerHTML = '';

  if (list.length === 0) {
    container.innerHTML = "❌ Нет школ и садов в радиусе";
    return;
  }

  list.forEach(obj => {

    const pm = new ymaps.Placemark(obj.coords, {
      balloonContent: obj.name
    });

    pm.events.add('click', () => buildRoute(obj));

    map.geoObjects.add(pm);

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <b>${obj.name}</b><br>
      ${(obj.dist/1000).toFixed(2)} км
    `;

    div.onclick = () => buildRoute(obj);

    container.appendChild(div);

  });

}

// маршрут
function buildRoute(obj) {

  if (route) map.geoObjects.remove(route);

  ymaps.route([center, obj.coords], {
    routingMode: 'pedestrian'
  }).then(r => {

    route = r;
    map.geoObjects.add(route);

    const dist = r.getLength();

    alert("Расстояние: " + (dist/1000).toFixed(2) + " км");

    map.setBounds(route.getBounds(), {
      checkZoomRange:true
    });

  });

}
</script>

</body>
</html>
