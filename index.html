<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поиск школ</title>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
}
#map {
    width: 70%;
    height: 100%;
    float: left;
}
#list {
    width: 30%;
    height: 100%;
    float: left;
    overflow-y: auto;
    padding: 10px;
    background: #f5f5f5;
}
.item {
    padding: 8px;
    border-bottom: 1px solid #ccc;
    cursor: pointer;
}
.item:hover {
    background: #e0e0e0;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="list"><b>Результаты:</b></div>

<script>
ymaps.ready(init);

function init() {

    var map = new ymaps.Map("map", {
        center: [55.75, 37.61],
        zoom: 10
    });

    // 🔥 ПОИСК (как в Яндексе)
    var searchControl = new ymaps.control.SearchControl({
        options: {
            provider: 'yandex#search',
            size: 'large',
            float: 'left'
        }
    });

    map.controls.add(searchControl);

    // 🔥 ОБРАБОТКА РЕЗУЛЬТАТОВ
    searchControl.events.add('resultshow', function () {

        var results = searchControl.getResultsArray();
        var list = document.getElementById("list");
        list.innerHTML = "<b>Результаты:</b>";

        results.forEach(function (obj, index) {

            var name = obj.properties.get('name');

            var div = document.createElement("div");
            div.className = "item";
            div.innerHTML = name;

            div.onclick = function () {
                map.setCenter(obj.geometry.getCoordinates(), 16);

                // маршрут
                ymaps.route([
                    map.getCenter(),
                    obj.geometry.getCoordinates()
                ]).then(function(route) {
                    map.geoObjects.add(route);
                });
            };

            list.appendChild(div);
        });

    });

    // 🔥 сразу ищем школы
    searchControl.search("школы Красногорск");
}
</script>

</body>
</html>
