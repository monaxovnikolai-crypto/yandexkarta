<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карта с маршрутами</title>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial;
}

#map {
    width: 100%;
    height: 100%;
}

.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 260px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.panel input, .panel select, .panel button {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}

</style>
</head>

<body>

<div class="panel">
    <input id="from" placeholder="Откуда">
    <input id="to" placeholder="Куда">

    <select id="mode">
        <option value="auto">🚗 Машина</option>
        <option value="pedestrian">🚶 Пешком</option>
        <option value="bicycle">🚴 Велосипед</option>
        <option value="masstransit">🚌 Транспорт</option>
    </select>

    <button onclick="buildRoute()">Построить маршрут</button>
    <button onclick="clearMap()">Очистить</button>
</div>

<div id="map"></div>

<script>
ymaps.ready(init);

let map;
let route;
let fromCoords = null;
let toCoords = null;

function init() {
    map = new ymaps.Map("map", {
        center: [55.76, 37.64],
        zoom: 10,
        controls: ['zoomControl', 'geolocationControl']
    });

    // Подсказки (как в Яндексе)
    new ymaps.SuggestView('from');
    new ymaps.SuggestView('to');

    // Клик по карте
    map.events.add('click', function (e) {
        let coords = e.get('coords');

        if (!fromCoords) {
            fromCoords = coords;
            addPlacemark(coords, "Откуда");
        } else {
            toCoords = coords;
            addPlacemark(coords, "Куда");
        }
    });
}

// 📍 Добавление точки
function addPlacemark(coords, text) {
    let placemark = new ymaps.Placemark(coords, {
        balloonContent: text
    });

    map.geoObjects.add(placemark);
}

// 🔍 Геокодинг
function geocode(inputId) {
    let value = document.getElementById(inputId).value;

    return ymaps.geocode(value).then(function(res) {
        let obj = res.geoObjects.get(0);
        return obj ? obj.geometry.getCoordinates() : null;
    });
}

// 🚗 Построение маршрута
async function buildRoute() {

    if (!fromCoords) {
        fromCoords = await geocode('from');
    }

    if (!toCoords) {
        toCoords = await geocode('to');
    }

    if (!fromCoords || !toCoords) {
        alert("Введите точки");
        return;
    }

    if (route) {
        map.geoObjects.remove(route);
    }

    let mode = document.getElementById('mode').value;

    route = new ymaps.multiRouter.MultiRoute({
        referencePoints: [fromCoords, toCoords],
        params: {
            routingMode: mode
        }
    }, {
        boundsAutoApply: true
    });

    map.geoObjects.add(route);
}

// 🧹 Очистка
function clearMap() {
    map.geoObjects.removeAll();
    route = null;
    fromCoords = null;
    toCoords = null;

    document.getElementById('from').value = '';
    document.getElementById('to').value = '';
}
</script>

</body>
</html>
