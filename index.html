<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Школы и сады</title>

<script src="https://api-maps.yandex.ru/2.1/?apikey=ТВОЙ_API_KEY&lang=ru_RU"></script>

<style>
body { margin:0; font-family:sans-serif; }
.app { display:flex; height:100vh; }
#map { flex:2; }
.sidebar {
  width:350px;
  background:#fff;
  overflow:auto;
  border-left:1px solid #ccc;
  padding:10px;
}
.item {
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
  cursor:pointer;
}
.item:hover { background:#f0f7ff; }
</style>
</head>

<body>

<div class="app">
  <div id="map"></div>
  <div class="sidebar">
    <h3>Школы и сады</h3>
    <div id="list"></div>
  </div>
</div>

<script>
let map;
let center;
let circle;
let route;
let placemarks = [];

const radius = 1000; // радиус в метрах

ymaps.ready(() => {

  map = new ymaps.Map("map", {
    center: [55.75, 37.61],
    zoom: 13
  });

  // клик = центр
  map.events.add('click', e => {
    const coords = e.get('coords');
    setCenter(coords);
  });

});

function setCenter(coords) {

  center = coords;

  map.geoObjects.removeAll();

  // точка центра
  const centerMark = new ymaps.Placemark(coords, {
    iconCaption: "Центр"
  }, { preset: 'islands#redIcon' });

  map.geoObjects.add(centerMark);

  // круг
  circle = new ymaps.Circle([coords, radius], {}, {
    fillColor: "#0000ff22",
    strokeColor: "#0000ff"
  });

  map.geoObjects.add(circle);

  search();
}

function search() {

  document.getElementById('list').innerHTML = "Загрузка...";

  const bounds = circle.geometry.getBounds();

  const terms = ['школа', 'детский сад'];

  let all = [];

  Promise.all(terms.map(term => {
    return ymaps.search({
      text: term,
      boundedBy: bounds,
      type: 'biz',
      results: 50
    });
  })).then(results => {

    results.forEach(res => {
      res.geoObjects.each(obj => {

        const name = obj.properties.get('name') || '';
        const coords = obj.geometry.getCoordinates();

        // 🔥 жесткий фильтр
        const low = name.toLowerCase();
        if (!low.includes('школ') && !low.includes('сад')) return;

        const dist = ymaps.coordSystem.geo.getDistance(center, coords);
        if (dist > radius) return;

        all.push({
          name: name,
          coords: coords,
          dist: dist
        });

      });
    });

    all.sort((a,b)=>a.dist-b.dist);

    render(all);

  });

}

function render(objects) {

  const list = document.getElementById('list');
  list.innerHTML = '';

  objects.forEach(obj => {

    // метка
    const pm = new ymaps.Placemark(obj.coords, {
      balloonContent: obj.name
    });

    pm.events.add('click', () => buildRoute(obj));

    map.geoObjects.add(pm);
    placemarks.push(pm);

    // список справа
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <b>${obj.name}</b><br>
      ${(obj.dist/1000).toFixed(2)} км
    `;

    div.onclick = () => buildRoute(obj);

    list.appendChild(div);

  });

}

function buildRoute(obj) {

  if (route) map.geoObjects.remove(route);

  ymaps.route([center, obj.coords], {
    routingMode: 'pedestrian'
  }).then(r => {

    route = r;
    map.geoObjects.add(route);

    map.setBounds(route.getBounds(), {
      checkZoomRange:true
    });

  });

}
</script>

</body>
</html>
