<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карта школ и садов Московской области</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }
        
        /* КАРТА СЛЕВА */
        .map-container {
            flex: 2;
            position: relative;
            min-width: 60%;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* ПАНЕЛЬ СПРАВА */
        .sidebar {
            width: 380px;
            background: #f8fafc;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }
        
        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .sidebar-header p {
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .filters {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }
        
        .filters label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            display: block;
            margin-bottom: 6px;
        }
        
        .district-select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        
        .district-select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .stats {
            padding: 12px 20px;
            background: #eef2ff;
            font-size: 13px;
            color: #1e40af;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
        }
        
        .radius-control {
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .radius-control label {
            font-size: 12px;
            color: #64748b;
            display: block;
            margin-bottom: 6px;
        }
        
        .radius-slider {
            width: 100%;
        }
        
        .radius-value {
            font-size: 12px;
            font-weight: 600;
            color: #3b82f6;
            margin-top: 4px;
        }
        
        .objects-list {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }
        
        .object-card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .object-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .object-card.active {
            border-left: 3px solid;
        }
        
        .object-card.school.active {
            border-left-color: #3b82f6;
            background: #eff6ff;
        }
        
        .object-card.kindergarten.active {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }
        
        .object-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .object-address {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 6px;
        }
        
        .object-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .badge-school {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-kindergarten {
            background: #dcfce7;
            color: #166534;
        }
        
        .loading {
            padding: 20px;
            text-align: center;
            color: #64748b;
        }
        
        .load-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .load-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        /* Информационная панель на карте */
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-height: 70vh;
            overflow-y: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 16px;
            z-index: 20;
            display: none;
            border: 1px solid #e2e8f0;
        }
        
        .info-panel.show {
            display: block;
        }
        
        .info-panel h3 {
            font-size: 16px;
            margin-bottom: 12px;
            padding-right: 24px;
        }
        
        .info-panel .close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .info-field {
            margin-bottom: 12px;
        }
        
        .info-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        .info-value {
            font-size: 14px;
            color: #1e293b;
        }
        
        .route-list {
            margin-top: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 12px;
        }
        
        .route-item {
            padding: 8px;
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .route-item:hover {
            background: #e2e8f0;
        }
        
        .route-item .route-dist {
            float: right;
            font-weight: 600;
            color: #3b82f6;
        }
        
        .clear-point-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .clear-point-btn:hover {
            background: #f1f5f9;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 300px;
            }
            .info-panel {
                width: 280px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="map-container">
        <div id="map"></div>
        <button class="clear-point-btn" id="clearPointBtn" style="display: none;">🗑️ Очистить точку</button>
        <div id="infoPanel" class="info-panel">
            <button class="close" onclick="closeInfoPanel()">×</button>
            <div id="infoContent"></div>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🏫 Образовательная инфраструктура МО</h1>
            <p>Школы и детские сады</p>
        </div>
        
        <div class="filters">
            <label>Выберите городской округ</label>
            <select id="districtSelect" class="district-select">
                <option value="">-- Загрузка округов --</option>
            </select>
        </div>
        
        <div class="radius-control" id="radiusControl" style="display: none;">
            <label>🎯 Радиус подсветки (метров)</label>
            <input type="range" id="radiusSlider" class="radius-slider" min="100" max="2000" step="50" value="800">
            <div class="radius-value" id="radiusValue">800 м</div>
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            <span>📍 Объектов: <span id="objectCount">0</span></span>
            <span id="nearCount" style="color: #22c55e;"></span>
        </div>
        
        <div id="objectsList" class="objects-list">
            <div class="loading">Выберите округ для загрузки объектов</div>
        </div>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey=87be84cf-0dc0-454f-974a-dc91198feaca&lang=ru_RU"></script>
<script>
    const WORKER_URL = 'https://yandexkarty.monaxovnikolai-31d.workers.dev';
    
    let map = null;
    let placemarks = [];
    let currentObjects = [];
    let currentDistrict = '';
    let currentRoutes = []; // массив маршрутов
    let userPoint = null;
    let userPointPlacemark = null;
    let radius = 800;
    let activeRoute = null;
    
    ymaps.ready(() => {
        map = new ymaps.Map('map', {
            center: [55.7, 37.6],
            zoom: 10,
            controls: ['zoomControl', 'fullscreenControl']
        });
        
        // Клик по карте — ставим точку
        map.events.add('click', (e) => {
            const coords = e.get('coords');
            setUserPoint(coords);
        });
        
        loadDistricts();
    });
    
    async function loadDistricts() {
        try {
            const response = await fetch(`${WORKER_URL}/districts`);
            const data = await response.json();
            const select = document.getElementById('districtSelect');
            
            if (data.districts && data.districts.length > 0) {
                select.innerHTML = '<option value="">-- Выберите округ --</option>';
                data.districts.forEach(district => {
                    const option = document.createElement('option');
                    option.value = district;
                    option.textContent = district;
                    select.appendChild(option);
                });
            } else {
                select.innerHTML = '<option value="">Нет данных</option>';
            }
            
            select.addEventListener('change', (e) => {
                if (e.target.value) {
                    clearUserPoint();
                    loadObjects(e.target.value);
                } else {
                    clearMap();
                }
            });
        } catch (err) {
            console.error(err);
            document.getElementById('districtSelect').innerHTML = '<option value="">Ошибка загрузки</option>';
        }
    }
    
    async function loadObjects(district) {
        currentDistrict = district;
        document.getElementById('objectsList').innerHTML = '<div class="loading">Загрузка объектов...</div>';
        clearMap();
        clearUserPoint();
        
        try {
            const response = await fetch(`${WORKER_URL}/objects?district=${encodeURIComponent(district)}`);
            const data = await response.json();
            
            if (data.objects && data.objects.length > 0) {
                currentObjects = data.objects;
                document.getElementById('stats').style.display = 'flex';
                document.getElementById('objectCount').textContent = data.objects.length;
                renderObjectsList(data.objects);
                await geocodeAllObjects(data.objects);
            } else {
                document.getElementById('objectsList').innerHTML = '<div class="loading">Нет объектов в выбранном округе</div>';
                document.getElementById('stats').style.display = 'none';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('objectsList').innerHTML = '<div class="loading">Ошибка загрузки объектов</div>';
        }
    }
    
    function renderObjectsList(objects) {
        const container = document.getElementById('objectsList');
        container.innerHTML = '';
        
        objects.forEach((obj, idx) => {
            const loadPercent = parseInt(obj.loadPercent);
            const loadColor = loadPercent > 120 ? '#ef4444' : (loadPercent > 100 ? '#e8a000' : '#22c55e');
            
            const card = document.createElement('div');
            card.className = `object-card ${obj.type}`;
            card.setAttribute('data-id', obj.id);
            card.innerHTML = `
                <div class="object-name">
                    <span class="object-badge ${obj.type === 'school' ? 'badge-school' : 'badge-kindergarten'}">
                        ${obj.type === 'school' ? '🏫 Школа' : '🏫 Детский сад'}
                    </span>
                    <span style="margin-left: 8px;">${obj.name || 'Без названия'}</span>
                </div>
                <div class="object-address">📍 ${obj.address || 'Адрес не указан'}</div>
                ${obj.capacity ? `<div style="font-size: 11px; color: #64748b;">👥 Вместимость: ${obj.capacity} мест</div>` : ''}
                ${obj.loadPercent ? `
                    <div style="font-size: 11px; margin-top: 6px;">
                        📊 Загрузка: ${obj.loadPercent}%
                        <div class="load-bar">
                            <div class="load-bar-fill" style="width: ${Math.min(obj.loadPercent, 200)}%; background: ${loadColor}"></div>
                        </div>
                    </div>
                ` : ''}
            `;
            card.onclick = () => {
                selectObject(obj, idx);
                if (obj.coordinates) {
                    map.setCenter([obj.coordinates.lat, obj.coordinates.lng], 16);
                }
            };
            container.appendChild(card);
        });
    }
    
    function getObjectColor(obj, isNear = true) {
        const baseColor = obj.type === 'school' ? '#3b82f6' : '#22c55e';
        if (!isNear) {
            // Затемнённый цвет
            return obj.type === 'school' ? '#1e40af' : '#14532d';
        }
        return baseColor;
    }
    
    function updatePlacemarksOpacity() {
        if (!userPoint) {
            // Нет точки — все яркие
            placemarks.forEach(pm => {
                pm.options.set('iconColor', pm.userData.originalColor);
                pm.options.set('opacity', 1);
            });
            document.getElementById('radiusControl').style.display = 'none';
            document.getElementById('nearCount').textContent = '';
            return;
        }
        
        document.getElementById('radiusControl').style.display = 'block';
        
        let nearCount = 0;
        const point = [userPoint.lat, userPoint.lng];
        
        placemarks.forEach(pm => {
            const coords = pm.geometry.getCoordinates();
            const distance = ymaps.coordSystem.geo.getDistance(point, coords);
            const isNear = distance <= radius;
            
            if (isNear) nearCount++;
            
            const color = getObjectColor(pm.userData, isNear);
            pm.options.set('iconColor', color);
            pm.options.set('opacity', isNear ? 1 : 0.5);
        });
        
        document.getElementById('nearCount').innerHTML = `🎯 В радиусе ${radius}м: <strong style="color:#22c55e">${nearCount}</strong>`;
        
        // Перестраиваем маршруты от точки
        buildRoutesFromPoint();
    }
    
    async function buildRoutesFromPoint() {
        // Удаляем старые маршруты
        currentRoutes.forEach(route => {
            if (route && map.geoObjects.indexOf(route) !== -1) {
                map.geoObjects.remove(route);
            }
        });
        currentRoutes = [];
        
        if (!userPoint) return;
        
        const pointCoords = [userPoint.lat, userPoint.lng];
        
        for (const obj of currentObjects) {
            if (!obj.coordinates) continue;
            
            const targetCoords = [obj.coordinates.lat, obj.coordinates.lng];
            const distance = ymaps.coordSystem.geo.getDistance(pointCoords, targetCoords);
            
            // Строим маршрут только для объектов в радиусе или если нужно показать все маршруты
            if (distance <= radius * 1.2) {
                try {
                    const multiRoute = new ymaps.multiRouter.MultiRoute({
                        referencePoints: [pointCoords, targetCoords],
                        params: { routingMode: 'pedestrian' }
                    }, {
                        boundsAutoApply: false,
                        wayPointDraggable: false,
                        visible: false  // скрываем по умолчанию
                    });
                    
                    multiRoute.userData = { objectId: obj.id, distance: distance };
                    
                    // Ждём загрузки маршрута
                    multiRoute.model.events.add('requestsuccess', () => {
                        const routes = multiRoute.getRoutes();
                        if (routes.length > 0) {
                            const routeDistance = routes[0].properties.get('distance')?.text || 
                                                  (distance / 1000).toFixed(1) + ' км';
                            multiRoute.userData.distanceText = routeDistance;
                        }
                    });
                    
                    map.geoObjects.add(multiRoute);
                    currentRoutes.push(multiRoute);
                } catch(e) {
                    console.error('Ошибка маршрута', e);
                }
            }
        }
    }
    
    function setUserPoint(coords) {
        if (userPointPlacemark) {
            map.geoObjects.remove(userPointPlacemark);
        }
        
        userPoint = { lat: coords[0], lng: coords[1] };
        
        userPointPlacemark = new ymaps.Placemark(coords, {
            hintContent: 'Центр поиска',
            balloonContent: `Точка поиска<br>Радиус: ${radius} м`
        }, {
            preset: 'islands#redCircleIcon',
            draggable: true
        });
        
        userPointPlacemark.events.add('dragend', (e) => {
            const newCoords = e.get('target').geometry.getCoordinates();
            userPoint = { lat: newCoords[0], lng: newCoords[1] };
            updatePlacemarksOpacity();
        });
        
        map.geoObjects.add(userPointPlacemark);
        document.getElementById('clearPointBtn').style.display = 'block';
        
        updatePlacemarksOpacity();
    }
    
    function clearUserPoint() {
        if (userPointPlacemark) {
            map.geoObjects.remove(userPointPlacemark);
            userPointPlacemark = null;
        }
        userPoint = null;
        
        currentRoutes.forEach(route => {
            if (route && map.geoObjects.indexOf(route) !== -1) {
                map.geoObjects.remove(route);
            }
        });
        currentRoutes = [];
        
        document.getElementById('clearPointBtn').style.display = 'none';
        document.getElementById('radiusControl').style.display = 'none';
        document.getElementById('nearCount').textContent = '';
        
        // Восстанавливаем цвета меток
        placemarks.forEach(pm => {
            pm.options.set('iconColor', pm.userData.originalColor);
            pm.options.set('opacity', 1);
        });
    }
    
    document.getElementById('clearPointBtn').addEventListener('click', () => {
        clearUserPoint();
    });
    
    document.getElementById('radiusSlider').addEventListener('input', (e) => {
        radius = parseInt(e.target.value);
        document.getElementById('radiusValue').textContent = radius + ' м';
        if (userPoint) {
            updatePlacemarksOpacity();
        }
    });
    
    function createPlacemark(obj) {
        const loadPercent = parseInt(obj.loadPercent);
        let color = obj.type === 'school' ? '#3b82f6' : '#22c55e';
        
        const placemark = new ymaps.Placemark(
            [obj.coordinates.lat, obj.coordinates.lng],
            {
                balloonContentHeader: obj.name,
                balloonContentBody: `
                    <strong>Тип:</strong> ${obj.type === 'school' ? 'Школа' : 'Детский сад'}<br>
                    <strong>Адрес:</strong> ${obj.address || '—'}<br>
                    ${obj.capacity ? `<strong>Вместимость:</strong> ${obj.capacity} мест<br>` : ''}
                    ${obj.loadPercent ? `<strong>Загрузка:</strong> ${obj.loadPercent}%<br>` : ''}
                    <a href="#" onclick="selectObjectById('${obj.id}'); return false;">Подробнее →</a>
                `,
                hintContent: obj.name
            },
            {
                preset: 'islands#circleIcon',
                iconColor: color
            }
        );
        
        placemark.userData = {
            objectId: obj.id,
            originalColor: color,
            type: obj.type
        };
        
        placemark.events.add('click', () => {
            const idx = currentObjects.findIndex(o => o.id === obj.id);
            if (idx !== -1) selectObject(obj, idx);
        });
        
        return placemark;
    }
    
    async function geocodeAllObjects(objects) {
        const geocodePromises = objects.map(async (obj, idx) => {
            if (!obj.coordinates && obj.address) {
                try {
                    const result = await ymaps.geocode(obj.address, { results: 1 });
                    const firstGeoObject = result.geoObjects.get(0);
                    if (firstGeoObject) {
                        const coords = firstGeoObject.geometry.getCoordinates();
                        obj.coordinates = { lat: coords[0], lng: coords[1] };
                        
                        const placemark = createPlacemark(obj);
                        placemarks.push(placemark);
                        map.geoObjects.add(placemark);
                    }
                } catch (err) {
                    console.error(`Геокодирование для ${obj.name} не удалось:`, err);
                }
            } else if (obj.coordinates) {
                const placemark = createPlacemark(obj);
                placemarks.push(placemark);
                map.geoObjects.add(placemark);
            }
        });
        
        await Promise.all(geocodePromises);
        renderObjectsList(objects);
        
        const firstWithCoords = objects.find(o => o.coordinates);
        if (firstWithCoords) {
            map.setCenter([firstWithCoords.coordinates.lat, firstWithCoords.coordinates.lng], 12);
        }
    }
    
    function selectObject(obj, idx) {
        document.querySelectorAll('.object-card').forEach((card, i) => {
            card.classList.toggle('active', i === idx);
        });
        showInfoPanel(obj);
        
        if (obj.coordinates) {
            map.setCenter([obj.coordinates.lat, obj.coordinates.lng], 16);
            
            // Показываем маршрут от точки до объекта
            if (userPoint) {
                highlightRouteToObject(obj.id);
            }
        }
    }
    
    function highlightRouteToObject(objectId) {
        // Убираем подсветку всех маршрутов
        currentRoutes.forEach(route => {
            if (route) {
                route.options.set('strokeColor', '#3b82f6');
                route.options.set('strokeWidth', 3);
                route.options.set('opacity', 0.3);
            }
        });
        
        // Подсвечиваем нужный
        const targetRoute = currentRoutes.find(r => r.userData?.objectId === objectId);
        if (targetRoute) {
            targetRoute.options.set('strokeColor', '#ef4444');
            targetRoute.options.set('strokeWidth', 5);
            targetRoute.options.set('opacity', 1);
            targetRoute.options.set('visible', true);
            
            // Показываем расстояние
            if (targetRoute.userData?.distanceText) {
                const panel = document.getElementById('infoPanel');
                if (panel.classList.contains('show')) {
                    const content = document.getElementById('infoContent');
                    const distHtml = `<div class="info-field" style="background:#eef2ff; padding:8px; border-radius:8px; margin-top:8px;">
                        <div class="info-label">🚶 Расстояние от точки поиска</div>
                        <div class="info-value">${targetRoute.userData.distanceText}</div>
                    </div>`;
                    // Добавляем, если ещё нет
                    if (!content.innerHTML.includes('Расстояние от точки поиска')) {
                        content.innerHTML += distHtml;
                    }
                }
            }
        }
    }
    
    function selectObjectById(id) {
        const idx = currentObjects.findIndex(o => o.id === id);
        if (idx !== -1) {
            selectObject(currentObjects[idx], idx);
        }
    }
    
    function showInfoPanel(obj) {
        const panel = document.getElementById('infoPanel');
        const content = document.getElementById('infoContent');
        
        content.innerHTML = `
            <h3>${obj.name || 'Без названия'}</h3>
            <div class="info-field">
                <div class="info-label">Тип учреждения</div>
                <div class="info-value">${obj.type === 'school' ? '🏫 Школа' : '🏫 Детский сад'}</div>
            </div>
            <div class="info-field">
                <div class="info-label">📍 Адрес</div>
                <div class="info-value">${obj.address || 'Не указан'}</div>
            </div>
            <div class="info-field">
                <div class="info-label">🏛️ Городской округ</div>
                <div class="info-value">${obj.district || 'Не указан'}</div>
            </div>
            ${obj.capacity ? `
            <div class="info-field">
                <div class="info-label">👥 Вместимость</div>
                <div class="info-value">${obj.capacity} мест</div>
            </div>
            ` : ''}
            ${obj.loadPercent ? `
            <div class="info-field">
                <div class="info-label">📊 Загрузка</div>
                <div class="info-value">${obj.loadPercent}%</div>
            </div>
            ` : ''}
            ${obj.secondShift ? `
            <div class="info-field">
                <div class="info-label">🕐 Вторая смена</div>
                <div class="info-value">${obj.secondShift} детей</div>
            </div>
            ` : ''}
            ${obj.status ? `
            <div class="info-field">
                <div class="info-label">📋 Статус</div>
                <div class="info-value">${obj.status}</div>
            </div>
            ` : ''}
        `;
        
        panel.classList.add('show');
    }
    
    function closeInfoPanel() {
        document.getElementById('infoPanel').classList.remove('show');
        
        // Убираем подсветку маршрутов
        currentRoutes.forEach(route => {
            if (route) {
                route.options.set('strokeColor', '#3b82f6');
                route.options.set('strokeWidth', 3);
                route.options.set('opacity', 0.3);
            }
        });
    }
    
    function clearMap() {
        if (placemarks.length) {
            placemarks.forEach(p => {
                if (p && map.geoObjects.indexOf(p) !== -1) {
                    map.geoObjects.remove(p);
                }
            });
            placemarks = [];
        }
        currentRoutes.forEach(route => {
            if (route && map.geoObjects.indexOf(route) !== -1) {
                map.geoObjects.remove(route);
            }
        });
        currentRoutes = [];
        closeInfoPanel();
    }
</script>
</body>
</html>
